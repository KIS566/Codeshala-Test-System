<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-align: center;
        }
        
        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c53030;
        }
        
        .btn-success {
            background: #38a169;
            color: white;
        }
        
        .btn-success:hover {
            background: #2f855a;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        
        .btn-warning:hover {
            background: #dd6b20;
        }
        
        .question-list {
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .question-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .question-text {
            flex: 1;
            margin-right: 20px;
        }
        
        .question-actions {
            display: flex;
            gap: 10px;
        }
        
        .setting-group {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .setting-group .form-group {
            flex: 1;
            min-width: 150px;
        }
        
        .export-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .stats {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            margin-left: 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .question-item {
                flex-direction: column;
            }
            
            .question-actions {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Admin Panel - Quiz Management</h1>
        
        <!-- Timer Settings -->
        <div class="section">
            <h2>⏱️ Timer Settings</h2>
            <div class="setting-group">
                <div class="form-group">
                    <label>Timer Duration (minutes):</label>
                    <input type="number" id="timerDuration" value="10" min="1" max="120">
                </div>
                <div class="form-group">
                    <label>Enable Timer:</label>
                    <select id="timerEnabled">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="updateTimer()">Update Timer Settings</button>
        </div>
        
        <!-- Quiz Basic Settings -->
        <div class="section">
            <h2>📝 Quiz Settings</h2>
            <div class="setting-group">
                <div class="form-group">
                    <label>Quiz Title:</label>
                    <input type="text" id="quizTitle" placeholder="Enter quiz title">
                </div>
                <div class="form-group">
                    <label>Passing Marks (%):</label>
                    <input type="number" id="passingMarks" value="60" min="0" max="100">
                </div>
            </div>
            <button class="btn btn-primary" onclick="updateQuizSettings()">Update Quiz Settings</button>
        </div>
        
        <!-- Add Questions -->
        <div class="section">
            <h2>➕ Add New Question</h2>
            <div class="form-group">
                <label>Question:</label>
                <textarea id="questionText" placeholder="Enter question here..."></textarea>
            </div>
            <div class="form-group">
                <label>Option A:</label>
                <input type="text" id="optionA" placeholder="Enter option A">
            </div>
            <div class="form-group">
                <label>Option B:</label>
                <input type="text" id="optionB" placeholder="Enter option B">
            </div>
            <div class="form-group">
                <label>Option C:</label>
                <input type="text" id="optionC" placeholder="Enter option C">
            </div>
            <div class="form-group">
                <label>Option D:</label>
                <input type="text" id="optionD" placeholder="Enter option D">
            </div>
            <div class="form-group">
                <label>Correct Answer:</label>
                <select id="correctAnswer">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>
            <button class="btn btn-success" onclick="addQuestion()">➕ Add Question</button>
            <button class="btn btn-primary" onclick="clearForm()">🗑️ Clear Form</button>
        </div>
        
        <!-- Question List -->
        <div class="section">
            <h2>📋 Current Questions <span class="stats" id="questionCount">0</span></h2>
            <div class="question-list" id="questionList"></div>
        </div>
        
        <!-- Export/Import -->
        <div class="section">
            <h2>💾 Backup & Restore</h2>
            <div class="export-section">
                <button class="btn btn-primary" onclick="exportData()">📥 Export Questions</button>
                <button class="btn btn-success" onclick="document.getElementById('importFile').click()">📤 Import Questions</button>
                <button class="btn btn-warning" onclick="resetToDefault()">🔄 Reset to Default 20 Questions</button>
                <input type="file" id="importFile" accept=".json" style="display: none" onchange="importData(event)">
            </div>
        </div>
        
        <!-- Preview Quiz Link -->
        <div class="section">
            <h2>🔗 Quiz Preview</h2>
            <button class="btn btn-primary" onclick="window.open('index.html', '_blank')">Open Quiz Page</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
